services:
  backend:
    build: ./backend
    # No direct host ports, accessed via nginx
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - TIMEOUT=600 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    # No direct host ports, accessed via nginx
    environment:
      # The frontend code running in the browser needs to hit the public IP /api
      - VITE_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
