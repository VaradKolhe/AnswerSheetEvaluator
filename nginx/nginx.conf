server {
    listen 80;

    # Add CSP header to allow eval (required for Vite dev server and some PDF libraries)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: http:; worker-src 'self' blob:; frame-src 'self'; font-src 'self';";

    # Frontend
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8000/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        
        # Increase max upload size for PDFs
        client_max_body_size 100M;

        # ML processing can be slow, extend timeouts to 10 minutes
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;

        # Ensure errors from backend are passed through
        proxy_intercept_errors off;
    }

    # Reports
    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        try_files $uri =404;
    }
}
